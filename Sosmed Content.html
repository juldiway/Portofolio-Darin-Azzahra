    <style>
        /* ====================================================
           STYLING UNTUK ANIMASI BACKGROUND (FLOATING SHAPES)
           ==================================================== */
        
        /* Mengatur agar container hero dan monitor bisa menampung elemen absolut */
        .hero, .pc-container {
            position: relative;
            overflow: hidden; /* Memastikan bentuk tidak keluar batas */
        }

        /* Container untuk bentuk-bentuk animasi */
        .bg-animation {
            position: absolute;
            inset: 0; /* Mengisi seluruh area parent */
            z-index: 1; /* Di belakang konten teks/monitor */
            pointer-events: none; /* Agar tidak mengganggu klik mouse */
        }

        /* Styling dasar untuk setiap bentuk */
        .shape {
            position: absolute;
            opacity: 0.5; /* Sedikit transparan agar lembut */
            animation: float 15s infinite linear; /* Panggil animasi */
        }

        /* Variasi Warna dan Bentuk */
        .circle-pink {
            background-color: #ff85a1;
            border-radius: 50%;
        }

        .circle-yellow {
            background-color: #ffd93d;
            border-radius: 50%;
        }

        .square-pink {
            background-color: #ff85a1;
            /* Tidak ada border-radius = kotak */
        }

        /* Posisi dan Ukuran Acak untuk setiap bentuk (Header Hero) */
        .hero .shape:nth-child(1) { width: 50px; height: 50px; top: 20%; left: 10%; animation-duration: 18s; }
        .hero .shape:nth-child(2) { width: 80px; height: 80px; top: 60%; left: 80%; animation-duration: 25s; animation-delay: -2s; }
        .hero .shape:nth-child(3) { width: 40px; height: 40px; top: 10%; left: 70%; animation-duration: 12s; animation-delay: -5s; }
        .hero .shape:nth-child(4) { width: 60px; height: 60px; top: 80%; left: 20%; animation-duration: 20s; animation-delay: -7s; }

        /* Posisi dan Ukuran Acak (Area Monitor) */
        .pc-container .shape:nth-child(1) { width: 60px; height: 60px; top: 15%; left: 5%; animation-duration: 22s; opacity: 0.3; }
        .pc-container .shape:nth-child(2) { width: 90px; height: 90px; top: 75%; left: 85%; animation-duration: 28s; animation-delay: -3s; opacity: 0.3; }
        .pc-container .shape:nth-child(3) { width: 50px; height: 50px; top: 50%; left: 90%; animation-duration: 16s; animation-delay: -6s; opacity: 0.3; }
        .pc-container .shape:nth-child(4) { width: 70px; height: 70px; top: 85%; left: 15%; animation-duration: 24s; animation-delay: -9s; opacity: 0.3; }


        /* DEFINISI ANIMASI FLOAT (MENGAMBANG & BERPUTAR) */
        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg); /* Bergerak naik & berputar */
            }
            100% {
                transform: translateY(0) rotate(360deg); /* Kembali ke posisi semula */
            }
        }


        /* ====================================================
           STYLING KONTEN ASLI (DIPERTAHANKAN)
           ==================================================== */
        
        /* Memastikan konten teks hero berada di atas animasi */
        .hero h1, .hero p {
            position: relative;
            z-index: 2;
        }

        .pc-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            background-color: #f0f0f0;
        }

        /* Memastikan monitor berada di atas animasi */
        .monitor, .monitor-stand, .monitor-base, .instruction {
            position: relative;
            z-index: 2;
        }

        .monitor {
            width: 80%;
            max-width: 800px;
            background: #333;
            border: 15px solid #222;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .monitor-screen {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #fff;
            overflow-x: auto;
            display: flex;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .monitor-screen::-webkit-scrollbar {
            display: none;
        }

        .monitor-screen img {
            min-width: 100%;
            height: 100%;
            object-fit: contain;
            background: #f9f9f9;
            scroll-snap-align: center;
        }

        .monitor-stand {
            width: 120px;
            height: 40px;
            background: #444;
        }

        .monitor-base {
            width: 250px;
            height: 15px;
            background: #333;
            border-radius: 5px;
        }

        .instruction {
            margin-top: 20px;
            font-size: 1rem;
            color: #555;
            font-weight: bold;
        }
        /* Styling Mockup PC / Monitor */
        .pc-container {
